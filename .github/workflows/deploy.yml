name: CI/CD to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            # 1. Masuk ke home dan bersihkan folder lama
            cd ~
            rm -rf uts-cloud-computing
            
            # 2. Clone ulang kode paling baru
            git clone https://github.com/sonjelll/uts-cloud-computing.git
            cd uts-cloud-computing
            
            # 3. Hentikan & Hapus kontainer lama (Namanya disamakan: web-app)
            sudo docker stop web-app || true
            sudo docker rm web-app || true
            
            # 4. Build image baru
            sudo docker build -t web-uts-image .
            
            # 5. Jalankan kontainer baru
            sudo docker run -d -p 8080:8080 --name web-app \
              -e DB_USER='admin' \
              -e DB_PASS='${{ secrets.DB_PASS }}' \
              -e DB_HOST='db-uts-sondang.cps0acgo6m1b.ap-southeast-2.rds.amazonaws.com' \
              -e DB_NAME='mysql' \
              -e AWS_REGION='ap-southeast-2' \
              -e S3_BUCKET='uts-cloud-sondang-bucket' \
              -e AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}' \
              -e AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
              web-uts-image