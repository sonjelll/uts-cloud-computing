on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            # Bersihkan folder lama agar tidak bentrok
            rm -rf uts-cloud-computing
            
            # Clone kode terbaru yang fresh
            git clone https://github.com/sonjelll/uts-cloud-computing.git
            cd uts-cloud-computing
            
            # Hentikan dan hapus container lama
            sudo docker stop web-app || true
            sudo docker rm web-app || true
            
            # Build docker
            sudo docker build -t web-uts-image .
            
            # Jalankan docker baru dengan Environment Variables AWS! (Isi bagian yg di dalam kurung siku dengan datamu)
            sudo docker run -d -p 8080:8080 --name web-uts \
              -e DB_USER='admin' \
              -e DB_PASS='${{ secrets.DB_PASS }}' \
              -e DB_HOST='db-uts-sondang.cps0acgo6m1b.ap-southeast-2.rds.amazonaws.com' \
              -e DB_NAME='db_uts_sondang' \
              -e AWS_REGION='ap-southeast-1' \
              -e S3_BUCKET='uts-cloud-sondang-bucket' \
              -e AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}' \
              -e AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
              web-uts-image